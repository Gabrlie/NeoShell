name: Release Android

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      runtime_version: ${{ steps.meta.outputs.runtime_version }}
      notes_file: ${{ steps.meta.outputs.notes_file }}
      title: ${{ steps.meta.outputs.title }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        id: meta
        run: node ./scripts/release/validate-version.mjs --mode release --tag "${GITHUB_REF_NAME}" --output "$GITHUB_OUTPUT"

      - name: Run CI checks
        run: npm run ci:check

  build:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      apk_url: ${{ steps.apk.outputs.url }}
      apk_build_id: ${{ steps.apk.outputs.id }}
      aab_url: ${{ steps.aab.outputs.url }}
      aab_build_id: ${{ steps.aab.outputs.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Prepare build directories
        run: mkdir -p .release dist

      - name: Build Android AAB
        run: npx eas-cli build --platform android --profile production-aab --non-interactive --wait --json > .release/aab-build.json

      - name: Extract AAB metadata
        id: aab
        run: |
          node --input-type=module - <<'EOF'
          import fs from 'node:fs';

          const parsed = JSON.parse(fs.readFileSync('.release/aab-build.json', 'utf8'));
          const build = Array.isArray(parsed) ? parsed[0] : parsed;
          const url = build?.artifacts?.buildUrl || build?.artifacts?.applicationArchiveUrl || '';

          if (!url) {
            throw new Error('Missing AAB artifact URL.');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'id=' + (build?.id ?? '') + '\nurl=' + url + '\n');
          EOF

      - name: Build Android APK
        run: npx eas-cli build --platform android --profile production-apk --non-interactive --wait --json > .release/apk-build.json

      - name: Extract APK metadata
        id: apk
        run: |
          node --input-type=module - <<'EOF'
          import fs from 'node:fs';

          const parsed = JSON.parse(fs.readFileSync('.release/apk-build.json', 'utf8'));
          const build = Array.isArray(parsed) ? parsed[0] : parsed;
          const url = build?.artifacts?.buildUrl || build?.artifacts?.applicationArchiveUrl || '';

          if (!url) {
            throw new Error('Missing APK artifact URL.');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'id=' + (build?.id ?? '') + '\nurl=' + url + '\n');
          EOF

      - name: Download Android artifacts
        run: |
          curl -L "${{ steps.apk.outputs.url }}" -o "dist/NeoShell-${{ needs.validate.outputs.version }}.apk"
          curl -L "${{ steps.aab.outputs.url }}" -o "dist/NeoShell-${{ needs.validate.outputs.version }}.aab"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs:
      - validate
      - build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-assets
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "dist/NeoShell-${{ needs.validate.outputs.version }}.apk#NeoShell-${{ needs.validate.outputs.version }}.apk" \
              "dist/NeoShell-${{ needs.validate.outputs.version }}.aab#NeoShell-${{ needs.validate.outputs.version }}.aab" \
              --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "NeoShell ${{ needs.validate.outputs.version }}" \
              --notes-file "${{ needs.validate.outputs.notes_file }}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              "dist/NeoShell-${{ needs.validate.outputs.version }}.apk#NeoShell-${{ needs.validate.outputs.version }}.apk" \
              "dist/NeoShell-${{ needs.validate.outputs.version }}.aab#NeoShell-${{ needs.validate.outputs.version }}.aab" \
              --title "NeoShell ${{ needs.validate.outputs.version }}" \
              --notes-file "${{ needs.validate.outputs.notes_file }}"
          fi

  update-manifest:
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
      - release

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-assets
          path: dist/

      - name: Update public updates manifest
        run: |
          node ./scripts/release/upsert-updates-manifest.mjs \
            --type release \
            --version "${{ needs.validate.outputs.version }}" \
            --runtime-version "${{ needs.validate.outputs.runtime_version }}" \
            --tag "${GITHUB_REF_NAME}" \
            --title "${{ needs.validate.outputs.title }}" \
            --notes-file "${{ needs.validate.outputs.notes_file }}" \
            --release-url "https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}" \
            --channel production \
            --apk-file "dist/NeoShell-${{ needs.validate.outputs.version }}.apk" \
            --apk-url "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/NeoShell-${{ needs.validate.outputs.version }}.apk" \
            --aab-file "dist/NeoShell-${{ needs.validate.outputs.version }}.aab" \
            --aab-url "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/NeoShell-${{ needs.validate.outputs.version }}.aab"

      - name: Commit updates manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates-manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): update public updates manifest for ${GITHUB_REF_NAME}"
          git push origin main
